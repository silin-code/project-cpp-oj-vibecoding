<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - OJ System</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container" style="max-width:400px;margin-top:80px">
  <h1>OJ System</h1>
  <div class="card">
    <h2>注册</h2>
    <form id="registerForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="用户名" required style="width:100%">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="密码" required style="width:100%">
      </div>
      <button type="submit" style="width:100%">注册</button>
      <p id="error" class="error"></p>
    </form>
    <p style="margin-top:12px;text-align:center">
      已有账号？<a href="/login.html">登录</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
(async () => {
    const user = await checkAuth();
    if (user.ok) window.location.href = '/';
})();

document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();
    const err = document.getElementById('error');
    err.textContent = '';
    try {
        const data = await api('/api/register', {
            method: 'POST',
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        window.location.href = '/login.html?registered=1';
    } catch (e) {
        err.textContent = e.message;
    }
};
</script>
</body>
</html>
