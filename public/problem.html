<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题目详情 - OJ System</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
  <nav>
    <a href="/">OJ System</a>
    <a href="/admin.html">管理</a>
    <span class="spacer"></span>
    <span id="userInfo"></span>
    <button class="secondary small" id="logoutBtn">退出</button>
  </nav>

  <div style="display:flex;align-items:baseline;gap:12px">
    <h2 id="problemTitle">加载中...</h2>
    <span id="difficultyBadge"></span>
  </div>
  <p id="limits" style="color:var(--text-muted);margin-bottom:16px"></p>

  <div class="card" id="problemDesc"></div>
  <div class="card" id="inputDesc"></div>
  <div class="card" id="outputDesc"></div>

  <h3>示例</h3>
  <div id="sampleCases" style="margin-bottom:16px"></div>

  <h3>代码编辑器</h3>
  <div id="editor" style="display:none"></div>
  <textarea id="codeFallback" style="width:100%;height:400px;background:var(--bg-input);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:monospace;font-size:0.9rem;resize:vertical">#include <bits/stdc++.h>
using namespace std;

int main() {
    
    return 0;
}
</textarea>
  <div style="display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px">
    <button id="submitBtn" onclick="submitCode()" disabled>提交</button>
    <span id="charCount" style="color:var(--text-muted);font-size:0.85rem">0 / 65536</span>
  </div>

  <div id="result"></div>

  <h3 style="margin-top:24px">提交历史</h3>
  <div id="submissionHistory" style="margin-bottom:32px">
    <p style="color:var(--text-muted)">加载中...</p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/submit.js"></script>
<script src="/js/problem_detail.js"></script>

<script type="importmap">
{
  "imports": {
    "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
    "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.5",
    "@codemirror/language": "https://esm.sh/@codemirror/language@6.11.0",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.1",
    "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.10",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.6",
    "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.8.5",
    "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
    "@codemirror/lang-cpp": "https://esm.sh/@codemirror/lang-cpp@6.0.2",
    "@lezer/common": "https://esm.sh/@lezer/common@1.2.3",
    "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.2",
    "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.1",
    "@lezer/cpp": "https://esm.sh/@lezer/cpp@1.1.3"
  }
}
</script>
<script type="module">
import { EditorView, keymap, lineNumbers, highlightActiveLine, highlightSpecialChars, drawSelection, rectangularSelection } from '@codemirror/view';
import { EditorState } from '@codemirror/state';
import { defaultHighlightStyle, syntaxHighlighting, indentOnInput, bracketMatching, foldGutter, foldKeymap, highlightActiveLineGutter } from '@codemirror/language';
import { defaultKeymap, history, historyKeymap } from '@codemirror/commands';
import { highlightSelectionMatches, searchKeymap } from '@codemirror/search';
import { closeBrackets, closeBracketsKeymap, autocompletion, completionKeymap } from '@codemirror/autocomplete';
import { lintKeymap } from '@codemirror/lint';
import { oneDark } from '@codemirror/theme-one-dark';
import { cpp } from '@codemirror/lang-cpp';

const editorEl = document.getElementById('editor');
const fallbackEl = document.getElementById('codeFallback');

const darkTheme = EditorView.theme({
    '&': { height: '400px', fontSize: '0.9rem' },
    '.cm-scroller': { overflow: 'auto' },
    '.cm-gutters': { backgroundColor: '#0f3460', color: '#888', border: 'none' },
    '.cm-activeLineGutter': { backgroundColor: '#1a1a2e' },
}, { dark: true });

const initialCode = fallbackEl.value;

const state = EditorState.create({
    doc: initialCode,
    extensions: [
        lineNumbers(),
        highlightActiveLine(),
        highlightActiveLineGutter(),
        highlightSpecialChars(),
        drawSelection(),
        rectangularSelection(),
        history(),
        foldGutter(),
        indentOnInput(),
        bracketMatching(),
        closeBrackets(),
        autocompletion(),
        highlightSelectionMatches(),
        syntaxHighlighting(defaultHighlightStyle),
        oneDark,
        darkTheme,
        keymap.of([
            ...closeBracketsKeymap,
            ...defaultKeymap,
            ...searchKeymap,
            ...historyKeymap,
            ...foldKeymap,
            ...completionKeymap,
            ...lintKeymap,
        ]),
        cpp(),
        EditorView.updateListener.of(update => {
            if (update.docChanged) {
                const len = update.state.doc.length;
                document.getElementById('charCount').textContent =
                    len + ' / 65536 (剩余 ' + (65536 - len) + ')';
            }
        }),
    ],
});

const view = new EditorView({
    state,
    parent: editorEl,
});

window.editorView = view;
editorEl.style.display = '';
fallbackEl.style.display = 'none';

document.getElementById('charCount').textContent =
    initialCode.length + ' / 65536 (剩余 ' + (65536 - initialCode.length) + ')';
</script>
<script>
(async () => {
    const user = await requireAuth();
    if (!user) return;
    document.getElementById('userInfo').textContent = user.username + ' (' + user.role + ')';

    document.getElementById('logoutBtn').onclick = async () => {
        await api('/api/logout', { method: 'POST' });
        window.location.href = '/login.html';
    };

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (!id || isNaN(id)) {
        document.getElementById('problemTitle').textContent = '题目不存在';
        return;
    }

    loadProblem(parseInt(id));
})();
</script>
</body>
</html>
